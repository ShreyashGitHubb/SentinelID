steps:
  # 1. Build & Push Backend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/sentinel-backend', './backend']
    id: 'build-backend'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/sentinel-backend']
    id: 'push-backend'

  # 2. Deploy Backend to Cloud Run (to get the URL)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'sentinel-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/sentinel-backend'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '2Gi'
    id: 'deploy-backend'

  # 3. Build & Push Frontend (Injecting Backend URL)
  # Note: This is tricky in a single Cloud Build because we need the URL from step 2.
  # For now, we'll build the frontend using the project's likely Cloud Run URL pattern.
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        BACKEND_URL=$(gcloud run services describe sentinel-backend --region us-central1 --format 'value(status.url)')
        docker build --build-arg NEXT_PUBLIC_API_URL=$$BACKEND_URL -t gcr.io/$PROJECT_ID/sentinel-frontend ./frontend
    id: 'build-frontend'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/sentinel-frontend']
    id: 'push-frontend'

  # 4. Deploy Frontend
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'sentinel-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/sentinel-frontend'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
    id: 'deploy-frontend'

images:
  - 'gcr.io/$PROJECT_ID/sentinel-backend'
  - 'gcr.io/$PROJECT_ID/sentinel-frontend'

options:
  logging: CLOUD_LOGGING_ONLY
